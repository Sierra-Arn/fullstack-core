[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "services"
version = "1.0.0"
readme = "README.md"
license = {file = "LICENSE"}

[tool.setuptools.packages.find]
where = ["src"]
include = [
    "session_lib*",
    "password_lib*",
    "rate_limit_lib*"
]