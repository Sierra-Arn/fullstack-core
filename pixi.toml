[workspace]
authors = ["Sierra Arn"]
name = "fullstack-core"
version = "1.0.0"
channels = ["nvidia", "conda-forge"]
platforms = [
    { name = "linux-64", platform = "linux-64" },
    { name = "linux-64-cuda", platform = "linux-64", cuda = "12.8" },
]
requires-pixi = ">=0.71.1"

# =============================================================================

[feature.cuda]
platforms = ["linux-64-cuda"]

[feature.cpu-only]
platforms = ["linux-64"]

# =============================================================================

[dependencies]
python = ">=3.12.13,<3.15"
python-dotenv = ">=1.2.2,<2"
requests = ">=2.34.2,<3"
just = ">=1.51.0,<2"
bun = ">=1.3.11,<2"

[pypi-dependencies]
scripts = { path = "./packages/scripts/", editable = true }

[tasks]

setup = { cmd = "pixi install --all && bun install"}

# =============================================================================

[feature.shared-pkg.dependencies]
python = ">=3.12.13,<3.15"
pydantic-settings = ">=2.14.2,<3"

sqlalchemy = ">=2.0.51,<3"
alembic = ">=1.18.4,<2"
psycopg = ">=3.2.10,<4"

redis-py = ">=8.0.1,<9"
celery = ">=5.5.3,<6"

[feature.shared-pkg.pypi-dependencies]
shared = { path = "./packages/shared/", editable = true }

# =============================================================================

[feature.services-pkg.dependencies]
bcrypt = ">=5.0.0,<6"

[feature.services-pkg.pypi-dependencies]
services = { path = "./packages/services/", editable = true }

# =============================================================================

[feature.server-pkg.dependencies]
python-fasthtml = ">=0.14.3,<0.15"
uvicorn = ">=0.49.0,<0.50"
python-json-logger = ">=4.1.0,<5"

[feature.server-pkg.pypi-dependencies]
server = { path = "./packages/server/", editable = true }

# =============================================================================

[feature.worker-inference-pkg.dependencies]
cuda-toolkit = ">=12.8.2,<13"
pytorch-gpu = ">=2.5.1,<3"
transformers = ">=5.12.1,<6"
accelerate = ">=1.14.0,<2"

[feature.worker-inference-pkg.pypi-dependencies]
worker-inference = { path = "./packages/worker-inference/", editable = true }

# =============================================================================

[feature.worker-maintenance-pkg.pypi-dependencies]
worker-maintenance = { path = "./packages/worker-maintenance/", editable = true }

# =============================================================================

[environments.default]
features = ["cpu-only", "default"]

[environments.full]
features = [
    "cuda",
    "shared-pkg",
    "services-pkg",
    "server-pkg",
    "worker-inference-pkg",
    "worker-maintenance-pkg"
]

[environments.server]
features = [
    "cpu-only",
    "shared-pkg",
    "services-pkg",
    "server-pkg"
]
no-default-feature = true

[environments.worker-inference]
features = [
    "cuda",
    "shared-pkg", 
    "worker-inference-pkg"
]
no-default-feature = true

[environments.worker-maintenance]
features = [
    "cpu-only",
    "shared-pkg", 
    "services-pkg",
    "worker-maintenance-pkg"
]
no-default-feature = true
